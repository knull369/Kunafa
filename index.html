<!DOCTYPE html>
<html>
<head>
    <title>لعبة صيد المربع</title>
    <style>
        #gameArea { width: 400px; height: 400px; border: 2px solid black; position: relative; background: #eee; }
        #player {
            width: 50px; height: 50px;
            background: red; /* اللون الأساسي */
            position: absolute; cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>اصطد المربع الأحمر!</h1>
    <div id="gameArea">
        <div id="player" onclick="movePlayer()"></div>
    </div>

    <script>
        function movePlayer() {
            const player = document.getElementById('player');
            const x = Math.floor(Math.random() * 350);
            const y = Math.floor(Math.random() * 350);
            player.style.left = x + 'px';
            player.style.top = y + 'px';
        }
    </script>
</body>
</html>
